<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROHIT | KING OF EGOIST</title>
    <link rel="stylesheet" href="style.css">
    <!-- แนะนำให้ใช้ Google Fonts เช่น Montserrat หรือ Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- ใส่รูปพื้นหลังใน CSS หรือใช้ tag img เป็น background -->
    <div class="bg-overlay"></div>

    <main class="content-container">
        <!-- ส่วนหัวและโลโก้ -->
        <header class="header-section">
            <h1 class="main-title">
                <span class="letter" style="--delay: 0s;">R</span>
                <span class="letter" style="--delay: 0.2s;">O</span>
                <span class="letter" style="--delay: 0.4s;">H</span>
                <span class="letter" style="--delay: 0.6s;">I</span>
                <span class="letter" style="--delay: 0.8s;">T</span>
            </h1>
            <p class="subtitle">KING OF EGOIST</p>
            <!-- แทนที่ src ด้วยไฟล์โลโก้ของคุณ -->
            <img src="picture/logo.png" alt="ROHIT Logo" class="center-logo">
        </header>

        <!-- ส่วนปุ่มเมนู -->
        <nav class="button-group">
            <a href="#" class="nav-btn">ROHIT FAMILY</a>
            <a href="#" class="nav-btn">ROHIT GANG</a>

        </nav>
    </main>

    <!-- แถบด้านล่าง -->
    <footer class="bottom-bar">
        <div class="admin-btn">ADMIN</div>
        <div class="credit">SYSTEM DESIGN BY <strong></strong></div>

        <!-- กลุ่มควบคุมเพลง (มีทั้งปุ่มและหลอดเสียง) -->
        <div class="audio-controls">
            <!-- หลอดปรับระดับเสียง -->
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
            
            <!-- กล่องเพลงแบบคลิกได้ -->
            <div class="music-player" onclick="toggleMusic()">
                <span id="music-icon">🎵</span>
                <span id="music-text">PLAY MUSIC</span>
                <audio id="bg-music" loop>
                    <source src="picture/bg.mp3" type="audio/mpeg">
                </audio>
            </div>
        </div>
    </footer>

    <!-- ... โค้ดกล่องเพลงของคุณที่อยู่ตรงนี้ ... -->
    
    <!-- ⚠️ ก๊อปปี้ส่วนนี้ไปวางไว้ก่อนปิด </body> -->
    <script>
        let music = document.getElementById("bg-music");
        let text = document.getElementById("music-text");
        let icon = document.getElementById("music-icon");
        let isPlaying = false;

        // ตั้งค่าระดับเสียง (ค่า 0.0 คือเงียบสุด ถึง 1.0 คือดังสุด)
        music.volume = 1.0; 

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                text.innerText = "PLAY MUSIC";
                icon.innerText = "🎵";
            } else {
                music.play();
                text.innerText = "NOW PLAYING...";
                icon.innerText = "🎶";
            }
            isPlaying = !isPlaying;
        }
    </script>
</body>
</html>
